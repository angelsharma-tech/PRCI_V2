# =========================================================
# PRCI v2 — Full-Stack Docker Compose Orchestration
# Phase 4.4 — Full Production Deployment & Dockerization
#
# Usage:
#   docker compose up --build
#   docker compose -f docker-compose.yml up -d
#   docker compose down
# =========================================================

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  db:
    image: postgres:15-alpine
    container_name: prci-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prci_password}
      POSTGRES_DB: ${POSTGRES_DB:-prci_v2}
    volumes:
      - prci_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prci} -d ${POSTGRES_DB:-prci_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - prci_network

  # =====================================================
  # FastAPI Backend
  # =====================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: prci-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-prci}:${POSTGRES_PASSWORD:-prci_password}@db:5432/${POSTGRES_DB:-prci_v2}}
      POSTGRESQL_URL: ${POSTGRESQL_URL:-}
      DB_ECHO: ${DB_ECHO:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      # Security
      SECRET_KEY: ${SECRET_KEY:-prci-v2-change-me-in-production}
      # API
      API_TITLE: ${API_TITLE:-PRCI v2 API}
      API_VERSION: ${API_VERSION:-4.4.0}
      API_DOCS_URL: ${API_DOCS_URL:-/docs}
      API_ENABLE_CORS: ${API_ENABLE_CORS:-true}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Development / Feature flags
      DEBUG: ${DEBUG:-false}
    volumes:
      - prci_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - prci_network

  # =====================================================
  # Streamlit Frontend
  # =====================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: prci-frontend
    restart: unless-stopped
    environment:
      # Point frontend to backend via nginx (public) or direct (internal)
      API_BASE_URL: ${API_BASE_URL:-http://nginx:80/api}
      # Database (frontend also needs DB for direct SQLAlchemy usage)
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-prci}:${POSTGRES_PASSWORD:-prci_password}@db:5432/${POSTGRES_DB:-prci_v2}}
      # Security
      SECRET_KEY: ${SECRET_KEY:-prci-v2-change-me-in-production}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Streamlit config
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_HEADLESS: true
    volumes:
      - prci_logs:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - prci_network

  # =====================================================
  # Nginx Reverse Proxy
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: prci-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - prci_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - prci_network

# =========================================================
# Named Volumes (persistent data)
# =========================================================
volumes:
  prci_postgres_data:
    driver: local
  prci_logs:
    driver: local

# =========================================================
# Internal Docker Network
# =========================================================
networks:
  prci_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
